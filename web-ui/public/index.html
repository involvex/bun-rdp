<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bun-rdp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      font-family: system-ui, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
    }
    #remote {
      display: block;
      max-width: 100%;
      max-height: 100%;
      cursor: none;
      image-rendering: pixelated;
    }
    #hud {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      backdrop-filter: blur(6px);
      pointer-events: none;
      z-index: 10;
    }
    #hud span { opacity: .7; }
    #status { color: #a3e635; font-weight: 600; }
    #latency::before { content: 'RTT '; opacity: .5; }
  </style>
</head>
<body>
  <div id="hud">
    <span id="status">Connecting…</span>
    <span>·</span>
    <span id="latency">— ms</span>
  </div>
  <canvas id="remote"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
